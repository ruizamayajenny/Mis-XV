<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XV Años</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@100..400&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Playwrite NZ", cursive;
        font-optical-sizing: auto;
        font-style: normal;
      }

      .content {
        grid-area: content;
        z-index: 2;
      }

      .header {
        grid-area: header;
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      .footer {
        grid-area: footer;
      }

      .wrapper {
        background-color: #eeeeee;
        color: #444;
        margin: auto;
        display: grid;
        grid-gap: 1em;
        grid-template-areas: "header" "content" "footer";
      }

      .box {
        background-color: rgb(255, 201, 201);
        color: #ffffff;
        border-radius: 5px;
        font-size: 20px;
      }

      .img-head {
        width: 100%;
        height: 100%;
        object-fit: fill;
        object-position: bottom;
        position: absolute;
        z-index: 1;
      }

      .parent {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(6, 1fr);
        grid-column-gap: 0px;
        grid-row-gap: 0px;
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        color: black;
      }

      .div1 {
        grid-area: 1 / 1 / 2 / 7;
      }
      .div2 {
        grid-area: 2 / 1 / 3 / 2;
      }
      .div3 {
        grid-area: 2 / 2 / 3 / 6;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-size: 40px;
      }
      .div4 {
        grid-area: 2 / 6 / 3 / 7;
      }
      .div5 {
        grid-area: 3 / 1 / 5 / 2;
      }
      .div6 {
        grid-area: 3 / 2 / 5 / 6;
        color: black;
        text-align: center;
      }
      .div7 {
        grid-area: 3 / 6 / 5 / 7;
      }
      .div8 {
        grid-area: 5 / 1 / 6 / 2;
      }
      .div9 {
        grid-area: 5 / 2 / 6 / 3;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div10 {
        grid-area: 5 / 3 / 6 / 4;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div11 {
        grid-area: 5 / 4 / 6 / 5;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div12 {
        grid-area: 5 / 5 / 6 / 6;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div13 {
        grid-area: 5 / 6 / 6 / 7;
      }
      .div14 {
        grid-area: 6 / 1 / 7 / 2;
      }
      .div15 {
        grid-area: 6 / 2 / 7 / 3;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div16 {
        grid-area: 6 / 3 / 7 / 4;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div17 {
        grid-area: 6 / 4 / 7 / 5;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div18 {
        grid-area: 6 / 5 / 7 / 6;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div19 {
        grid-area: 6 / 6 / 7 / 7;
      }

      .degrade {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(
          to top,
          rgba(233, 30, 99, 0.7),
          rgba(233, 30, 99, 0)
        );
        pointer-events: none;
      }

      .countdown {
        position: absolute;
        bottom: 22%;
        width: 100%;
        text-align: center;
      }

      @media only screen and (min-width: 390px) {
        .wrapper {
          grid-template-columns: 20% auto;
          grid-template-areas: "header   header" "content  content" "footer   footer";
        }

        .parent {
          grid-column-gap: 15px;
        }
      }

      @media only screen and (min-width: 600px) {
        .wrapper {
          grid-gap: 20px;
          grid-template-columns: 120px auto;
          grid-template-areas: "header  header" "content content" "footer  footer";
        }

        .div15 {
          font-size: 15px;
        }
        .div16 {
          grid-area: 6 / 3 / 7 / 4;
          color: black;
          text-align: center;
        }
        .div17 {
          grid-area: 6 / 4 / 7 / 5;
          color: black;
          text-align: center;
        }
        .div18 {
          grid-area: 6 / 5 / 7 / 6;
          color: black;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="box header">
        <img src="images/mafe.jpg" class="img-head" alt="" />
        <div class="parent">
          <div class="div1"></div>
          <div class="div2"></div>
          <div class="div3"><label>XV AÑOS</label></div>
          <div class="div4"></div>
          <div class="div5"></div>
          <div class="div6">
            <p>
              Los momentos mas hermosos de la vida se disfrutan junto a quienes
              más queremos
            </p>
          </div>
          <div class="div7"></div>
          <div class="degrade"></div>
          <div class="countdown"><label>✨ Cuenta Regresiva ✨</label></div>
          <div class="div8"></div>
          <div class="div9"><label id="day"></label></div>
          <div class="div10"><label id="hour"></label></div>
          <div class="div11"><label id="min"></label></div>
          <div class="div12"><label id="sec"></label></div>
          <div class="div13"></div>
          <div class="div14"></div>
          <div class="div15"><label>Dias</label></div>
          <div class="div16"><label>Horas</label></div>
          <div class="div17"><label>Minutos</label></div>
          <div class="div18"><label>Segundos</label></div>
          <div class="div19"></div>
        </div>
      </div>
      <div class="box content">
        <div>
          <img src="images/foto1.jpeg" style="width: 100%" alt="" />
        </div>
      </div>
      <div class="box footer">Footer</div>
    </div>

    <script src="js/script.js" type="text/javascript"></script>
  </body>
</html>
