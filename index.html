<!doctype html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap"
      rel="stylesheet"

    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@100..400&display=swap"
      rel="stylesheet"

    <style>
      body {
        margin: 0;
        font-family: "Playwrite NZ", cursive;
        font-optical-sizing: auto;
        font-style: normal;
      }

      .content {
        grid-area: content;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 1em;
      }

      .header {
        grid-area: header;
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      .footer {
        grid-area: footer;
      }

      .wrapper {
        background-color: #eeeeee;
        color: #444;
        margin: auto;
        display: grid;
        grid-gap: 1em;
        grid-template-areas: "header" "content" "footer";
      }

      .box {
        background-color: rgb(255, 201, 201);
        color: #ffffff;
        border-radius: 5px;
        font-size: 20px;
      }

      .img-head {
        width: 100%;
        height: 100%;
        object-fit: fill;
        object-position: bottom;
        position: absolute;
        z-index: 1;
      }

      .parent {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(6, 1fr);
        grid-column-gap: 0px;
        grid-row-gap: 0px;
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        color: black;
      }

      .div1 {
        grid-area: 1 / 1 / 2 / 7;
      }
      .div2 {
        grid-area: 2 / 1 / 3 / 2;
      }
      .div3 {
        grid-area: 2 / 2 / 3 / 6;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-size: 40px;
      }
      .div4 {
        grid-area: 2 / 6 / 3 / 7;
      }
      .div5 {
        grid-area: 3 / 1 / 5 / 2;
      }
      .div6 {
        grid-area: 3 / 2 / 5 / 6;
        color: black;
        text-align: center;
      }
      .div7 {
        grid-area: 3 / 6 / 5 / 7;
      }
      .div8 {
        grid-area: 5 / 1 / 6 / 2;
      }
      .div9 {
        grid-area: 5 / 2 / 6 / 3;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div10 {
        grid-area: 5 / 3 / 6 / 4;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div11 {
        grid-area: 5 / 4 / 6 / 5;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div12 {
        grid-area: 5 / 5 / 6 / 6;
        text-align: center;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-weight: bold;
      }
      .div13 {
        grid-area: 5 / 6 / 6 / 7;
      }
      .div14 {
        grid-area: 6 / 1 / 7 / 2;
      }
      .div15 {
        grid-area: 6 / 2 / 7 / 3;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div16 {
        grid-area: 6 / 3 / 7 / 4;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div17 {
        grid-area: 6 / 4 / 7 / 5;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div18 {
        grid-area: 6 / 5 / 7 / 6;
        color: black;
        text-align: center;
        font-weight: bold;
      }
      .div19 {
        grid-area: 6 / 6 / 7 / 7;
      }

      .degrade {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(
          to top,
          rgba(233, 30, 99, 0.7),
          rgba(233, 30, 99, 0)
        );
        pointer-events: none;
      }

      .countdown {
        position: absolute;
        bottom: 22%;
        width: 100%;
        text-align: center;
      }

      .mensaje {
        text-align: center;
        color: black;
        font-weight: bold;
        padding: 5%;
      }

      /* ===== Contenedor del slider ===== */
      .slider {
        position: relative;
        aspect-ratio: 4 / 3;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        margin: 3%;
      }

      .slider input[type="radio"],
      .zoom-toggle {
        display: none;
      }

      .slides {
        width: 100%;
        height: 100%;
      }

      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease;
      }

      #s1:checked ~ .slides #slide-1,
      #s2:checked ~ .slides #slide-2,
      #s3:checked ~ .slides #slide-3,
      #s4:checked ~ .slides #slide-4,
      #s5:checked ~ .slides #slide-5,
      #s6:checked ~ .slides #slide-6,
      #s7:checked ~ .slides #slide-7,
      #s8:checked ~ .slides #slide-8,
      #s9:checked ~ .slides #slide-9,
      #s10:checked ~ .slides #slide-10,
      #s11:checked ~ .slides #slide-11,
      #s12:checked ~ .slides #slide-12 {
        opacity: 1;
        visibility: visible;
      }

      /* ===== Miniatura dentro del slide ===== */
      .zoom-wrap {
        width: 100%;
        height: 100%;
        display: block;
        overflow: hidden;
        cursor: zoom-in;
      }

      .zoom-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        display: block;
        transition: transform 0.4s ease;
      }

      .zoom-wrap:hover img {
        transform: scale(1.05);
      }

      /* ===== Popup / lightbox estilo Google Fotos ===== */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
        z-index: 1000;
      }

      .zoom-toggle:checked ~ .lightbox {
        opacity: 1;
        visibility: visible;
      }

      .lightbox__backdrop {
        position: absolute;
        inset: 0;
        cursor: zoom-out;
      }

      .lightbox__img {
        position: relative;
        max-width: 92vw;
        max-height: 92vh;
        object-fit: contain;
        border-radius: 6px;
        cursor: zoom-out;
        box-shadow: 0 10px 60px rgba(0, 0, 0, 0.6);
        transform: scale(0.92);
        transition: transform 0.3s ease;
      }

      .zoom-toggle:checked ~ .lightbox .lightbox__img {
        transform: scale(1);
      }

      .lightbox__close {
        position: absolute;
        top: 20px;
        right: 28px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        cursor: zoom-out;
        z-index: 2;
        transition: background 0.2s ease;
      }

      .lightbox__close:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* ===== Flechas prev/next del slider ===== */
      .arrows {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #s1:checked ~ .slides #slide-1 .arrows,
      #s2:checked ~ .slides #slide-2 .arrows,
      #s3:checked ~ .slides #slide-3 .arrows,
      #s4:checked ~ .slides #slide-4 .arrows,
      #s5:checked ~ .slides #slide-5 .arrows,
      #s6:checked ~ .slides #slide-6 .arrows,
      #s7:checked ~ .slides #slide-7 .arrows,
      #s8:checked ~ .slides #slide-8 .arrows,
      #s9:checked ~ .slides #slide-9 .arrows,
      #s10:checked ~ .slides #slide-10 .arrows,
      #s11:checked ~ .slides #slide-11 .arrows,
      #s12:checked ~ .slides #slide-12 .arrows {
        opacity: 1;
      }

      .arrow {
        pointer-events: auto;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
      }

      .arrow:hover {
        background: rgba(0, 0, 0, 0.75);
      }

      /* ===== Puntos de navegación ===== */
      .dots {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 2;
      }

      .dots label {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        transition: background 0.2s ease;
      }

      #s2:checked ~ .dots label[for="s2"],
      #s3:checked ~ .dots label[for="s3"],
      #s4:checked ~ .dots label[for="s4"],
      #s5:checked ~ .dots label[for="s5"],
      #s6:checked ~ .dots label[for="s6"],
      #s7:checked ~ .dots label[for="s7"],
      #s8:checked ~ .dots label[for="s8"],
      #s9:checked ~ .dots label[for="s9"],
      #s10:checked ~ .dots label[for="s10"],
      #s11:checked ~ .dots label[for="s11"],
      #s12:checked ~ .dots label[for="s12"] {
        background: #fff;
      }

      @media only screen and (min-width: 390px) {

          grid-template-columns: 20% auto;

        }

          color: black;
          text-align: center;
        }
      }
    </style>
  </head>
